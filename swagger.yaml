        description: New article entry
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Article"
      responses:
        "200":
          description: Created new article entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "default":
          description: Invalid request was sent to the server.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  "/articles/{id}":
    get:
      operationId: getArticle
      summary: Get article by id
      description: Get an article by id
      tags:
        - Article
      parameters:
        - name: id
          required: true
          in: path
          description: Get article with specified id.
          schema:
            type: string
      responses:
        "200":
          description: Article instance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "default":
          description: Invalid request was sent to the server.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      operationId: updateArticle
      summary: Update an article
      description: Update an article
      tags:
        - Article
      parameters:
        - name: id
          required: true
          in: path
          description: ID of the article entry to update
          schema:
            type: string
      requestBody:
        description: Updated article entry
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Article"
      responses:
        "200":
          description: Update article entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "default":
          description: Invalid request was sent to the server.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      operationId: deleteArticle
      summary: Delete article entry
      description: Delete an article entry
      tags:
        - Article
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the article entry to delete
          schema:
            type: string
      responses:
        "200":
          description: Article entry deleted successfully
        "default":
          description: Failed to delete article

  "/articles/path":
    get:
      operationId: getArticleByPath
      summary: Get article by path
      description: Get an article by path
      tags:
        - Article
      parameters:
        - name: path
          required: true
          in: query
          description: Get article with specified path.
          schema:
            type: string
      responses:
        "200":
          description: Article instance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "default":
          description: Invalid request was sent to the server.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  "/articles/{id}/read":
    post:
      operationId: readArticle
      summary: Read an article
      description: Read an article
      tags:
        - Article
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the article entry to update
          schema:
            type: string
      requestBody:
        description: Updated article entry
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: string
      responses:
        "200":
          description: Updated article entry
        "default":
          description: Invalid request was sent to the server.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  "/articles/upload-file":
    post:
      operationId: uploadFileForArticle
      summary: Upload a file
      description: Returns a presigned URL. Images are allowed for all authenticated users; PDFs require admin role.
      tags:
        - Article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileMetadata"
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: string
                    format: uri
        "400":
          description: Unsupported content type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: PDF uploads require admin privileges.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "default":
          description: Invalid request was sent to the server.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  "/articles/list-media":
    get:
      operationId: listMediaFiles
      summary: List media files
      description: Retrieves a list of media files from S3 for wiki documentation.
      tags:
        - Article
      parameters:
        - name: prefix
          in: query
          required: false
          description: Optional prefix to filter media files by path.
          schema:
            type: string
      responses:
        "200":
          description: List of media files retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileMetadata"
        "default":
          description: Invalid request was sent to the server.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  "/articles/import-document":
    post:
      operationId: importDocument
      summary: Import a PDF document as wiki articles
      description: Parses a PDF from S3 and creates wiki articles based on the chosen import mode. Requires admin role.
      tags:
        - Article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentImportRequest"
      responses:
        "200":
          description: Import result summary with created articles.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentImportResult"
        "403":
          description: Access denied. Admin privileges required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: One or more articles already exist at the target path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: No sections could be detected in the PDF.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "default":
          description: Invalid request was sent to the server.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  "/jobs/vacation-slack-sync":
    post:
      operationId: vacationSlackSync
      summary: Checks for vacations starting at the current time and updates Slack status
      description: Internal job triggered by a scheduler based on a configured cron expression.
        This job runs periodically and is responsible for checking vacation data
        and synchronizing Slack user statuses accordingly.

        The job evaluates which vacations start  at the current time and updates Slack status for users whose vacation is starting

        This endpoint is documented for specification completeness and
        is not intended to be invoked manually.
      tags:
        - Slack
        - Vacation
        - Jobs
      responses:
        "200":
          description: Vacation Slack synchronization job executed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VacationSlackSyncResult'
        "500":
          description: Internal server error during job execution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      description: Error object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
          description: Error code
        message:
          type: string
          description: Error message

    User:
      type: object
      description: User Data
      required:
        - id
        - firstName
        - lastName
      properties:
        id:
          type: string
          format: uuid
          description: User's ID in Keycloak.
        firstName:
          type: string
          description: User's first name.
        lastName:
          type: string
          description: User's last name.
        email:
          type: string
          description: User's email.
        attributes:
          $ref: "#/components/schemas/Attributes"

    UserFlextime:
      type: object
      description: User data combined with their flextime information
      required:
        - user
        - flextime
      properties:
        user:
          type: object
          description: User information
          required:
            - firstName
            - lastName
          properties:
            firstName:
              type: string
              description: User's first name
            lastName:
              type: string
              description: User's last name
            email:
              type: string
              description: User's email address
            attributes:
              type: object
              description: User attributes
              properties:
                severaUserId:
                  type: string
                  description: User's ID in Severa system
                isActive:
                  type: boolean
                  description: Whether user is active  
        flextime:
          $ref: "#/components/schemas/Flextime"

    calculateUserContractedWeek:
      type: object
      description: User work week and days worked in a week.
      required:
        - contractedWeek
        - contractedDaysCount
      properties:
        contractedWeek:
          type: array
          description: > 
            Numeric array of the user's contracted workdays in a week 1 - 7 = Mon - Sun
            Compare with vacation date range to check vacation days consumption
          items:
            type: integer
            minimum: 0
            maximum: 6
        contractedDaysCount:
          type: integer
          description: Total number of contracted workdays in the week, taken from array length

    YearlyVacationDays:
      type: object
      description: Vacation allocation and balance for a specific year
      required:
        - total
        - remaining
      properties:
        total:
          type: integer
          description: Total vacation days allocated for the year
        remaining:
          type: integer
          description: Remaining vacation days for the year

    Attributes:
      type: object
      description: User`s custom attributes
      properties:
        severaUserId:
          type: string
          description: User`s ID in Severa
        isActive:
          type: boolean
          description: Defining if user is active e.g. is employed.
        vacationDaysByYear:
          type: array
          items:
            type: string
            description: Year and vacation days in format "YYYY:DDD".
        unspentVacationDaysByYear:
          type: array
          items:
            type: string
            description: Year and unspent vacation days in format "YYYY:DDD".
        passedQuestionnaires:
          type: array
          items:
            type: string
        forecastId:
          type: integer
          format: int32
          description: User's ID in Forecast. Used for keeping a reference of Forecast based TimeEntries and Users.

    UpdateUserAttribute:
      type: object
      description: Response after updating user attributes.
      properties:
        id:
          type: string
          format: uuid
          description: User's ID in Keycloak.
        updatedKeycloakAttributes:
          type: object
          properties:
            severaUserId:
              type: string
              description: User's ID in Severa.
        severaUser:
          $ref: "#/components/schemas/SeveraUser"

    SeveraUser:
      type: object
      description: The useUserFlextimer's information from Severa.
      properties:
        email:
          type: string
          description: The email address fetched from Severa.
        severaUserId:
          type: string
          description: The Severa user ID associated with the Keycloak attribute.
        severaKeyword:
          type: string
          description: The keyword returned from Severa API that is associated with the user.

    Skill:
      type: object
      description: A singular skill entity
      required:
        - name
        - years
        - category
      properties:
        name:
          type: string
          description: Name of the skill
        months:
          type: number
          description: Number of months of experience
        category:
          type: string
          description: Category of the skill

    UsersSkills:
      type: object
      description: A user entity with skills attribute
      required:
        - name
      properties:
        id:
          type: string
          format: uuid
          description: User`s Keycloak Id
          default: null
        name:
          type: string
          description: User`s name
        skills:
          type: array
          items:
            $ref: "#/components/schemas/Skill"

    Lead:
      type: object
      description: Lead data from Pipedrive API
      required:
        - leadId
        - title
        - interested
        - usedTech
        - addTime
        - updateTime
        - nextActivityDate
        - labelIds
      properties:
        leadId:
          type: string
          format: uuid
          description: LeadId is used to identify projects
        title:
          type: string
          description: Title or a Name of a Lead
        interested:
          type: string
          description: String where userIds are stored separated with semicolon.
        usedTech:
          type: string
          description: String where usedTech are stored separated with semicolon.
        addTime:
          type: string
          format: date-time
          description: Time when Lead is created or added to Pipedrive
        updateTime:
          type: string
          format: date-time
          description: Time when Lead is last updated to Pipedrive
        nextActivityDate:
          type: string
          format: date-time
          description: Time when next activity is going to happen on a Lead
        labelIds:
          type: array
          items:
            type: string
          description: String array where Lead labels are stored. labelIds are 'Hot', 'Warm' or 'Cold'

    Deal:
      type: object
      description: Deal data from Pipedrive API
      required:
        - dealId
        - title
        - interested
        - usedTech
        - value
        - currency
        - addTime
        - updateTime
        - nextActivityDate
        - nextActivitySubject
        - nextActivityNote
        - status
      properties:
        dealId:
          type: integer
          description: DealId is used to identify projects
        title:
          type: string
          description: Title or a Name of a Deal
        interested:
          type: string
          description: String where userIds are stored separated with semicolon.
        usedTech:
          type: string
          description: String where usedTech are stored separated with semicolon.
        value:
          type: number
          description: Value of a deal
        currency:
          type: string
          description: Currency that is used to tell the value of a deal
        addTime:
          type: string
          format: date-time
          description: Time when Deal is created or added to Pipedrive
        updateTime:
          type: string
          format: date-time
          description: Time when Deal is last updated to Pipedrive
        nextActivityDate:
          type: string
          format: date-time
          description: Time when next activity is going to happen on a Deal
        nextActivitySubject:
          type: string
          description: Used to tell the subject of a next activity.
        nextActivityNote:
          type: string
          description: Holds more information about the next activity.
        status:
          type: string
          description: Status of a Deal. Is the deal open, lost or won

    Interest:
      type: object
      description: Adding or removing interest to Pipedrive API
      required:
        - interest
      properties:
        interest:
          type: string
          description: String where userIds are stored separated with semicolon.

    OnCall:
      type: object
      description: On-call data from AWS DynamoDB
      required:
        - Year
        - Week
        - Username
        - Paid
      properties:
        Year:
          type: number
          description: Year of the on-call entry
        Week:
          type: number
          description: On call week number
        Username:
          type: string
          description: Username of the person on call
        Email:
          type: string
          format: email
          nullable: true 
          description: "Email address of the on-call user (may be null for past entries)"
        Paid:
          type: boolean
          description: Status of on call week payment


    OnCallPaid:
      type: object
      description: On-call request body to update paid status.
      required:
        - year
        - week
        - paid
      properties:
        year:
          type: number
          description: Selected year of on call entries
        week:
          type: number
          description: Selected week of on call entries
        paid:
          type: boolean
          description: Status of on call week payment

    SoftwareStatus:
      type: string
      description: Status of the software entry
      enum:
        - PENDING
        - UNDER_REVIEW
        - ACCEPTED
        - DEPRECATED
        - DECLINED

    SoftwareRegistry:
      type: object
      required:
        - name
        - description
        - url
        - image
        - createdBy
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the software entry
        name:
          type: string
          description: Name of the software
        description:
          type: string
          description: Description of the software
        url:
          type: string
          format: uri
          description: URL to relevant information/marketing page
        image:
          type: string
          format: uri
          description: URL to the image of the software
        status:
          $ref: "#/components/schemas/SoftwareStatus"
        review:
          type: string
          description: User review of the software
        createdBy:
          type: string
          description: User who created the software entry
        createdAt:
          type: string
          format: date-time
          description: Date and time when the software entry was created
        lastUpdatedBy:
          type: string
          description: User who last updated the software entry
        lastUpdatedAt:
          type: string
          format: date-time
          description: Date and time when the software entry was last updated
        recommend:
          type: array
          items:
            type: string
          description: An array that stores the user IDs of individuals who the software is recommended to
        tags:
          type: array
          items:
            type: string
          description: An array that holds tags associated with the software for categorization
        users:
          type: array
          items:
            type: string
          description: An array that stores the user IDs of individuals who have added or are using the software

    Questionnaire:
      type: object
      required:
        - title
        - description
        - questions
        - passScore
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the questionnaire
        title:
          type: string
          description: Title of the questionnaire
        description:
          type: string
          description: Description of the questionnaire
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"
          description: List of questions in the questionnaire
        tags:
          type: array
          items:
            type: string
          description: List of tags for the questionnaire
        passedUsers:
          type: array
          items:
            type: string
            format: uuid
          description: List of users who have passed the questionnaire
        passScore:
          type: integer
          description: Minimum score required to pass the questionnaire

    Question:
      type: object
      required:
        - questionText
        - answerOptions
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the question
        questionText:
          type: string
          description: The question text
        answerOptions:
          type: array
          items:
            $ref: "#/components/schemas/AnswerOption"
          description: List of answer options available for the question

    AnswerOption:
      type: object
      required:
        - label
        - isCorrect
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the answer option
        label:
          type: string
          description: Display text for the answer option
        isCorrect:
          type: boolean
          description: Indicates if this option is the correct answer

    VacationType:
      type: string
      description: Enum for vacation type
      enum:
        - VACATION

    VacationRequestStatuses:
      type: string
      description: Enum for vacation request status. Slack away synchronization is allowed only for APPROVED vacations.
      enum:
        - PENDING
        - APPROVED
        - DECLINED

    VacationRequest:
      type: object
      description: Person's single vacation request
      required:
        - userId
        - days
        - startDate
        - endDate
        - type
        - message
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: ID of vacation request in UUID
          default: null
        userId:
          type: string
          format: uuid
          description: User keycloak ID in UUID
        draft:
          type: boolean
          description: Draft state
        startDate:
          type: string
          format: date
          description: Date of vacation start
        endDate:
          type: string
          format: date
          description: Date of vacation end
        days:
          type: integer
          format: int32
          description: Vacation days used for requested vacation
        type:
          $ref: "#/components/schemas/VacationType"
          description: type of vacation request
        status:
          type: array
          items:
            $ref: "#/components/schemas/VacationRequestStatus"
            description: status of vacation request
        message:
          type: string
          description: Message attached to request
        createdBy:
          type: string
          format: uuid
          description: ID of person who created status in UUID
        createdAt:
          type: string
          format: date-time
          description: Date time of vacation request registration
        updatedAt:
          type: string
          format: date-time
          description: Date time of vacation request update

    VacationRequestStatus:
      type: object
      description: singular vacation request status
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/VacationRequestStatuses"
        createdBy:
          type: string
          format: uuid
          description: ID of person who created status in UUID
        updatedAt:
          type: string
          format: date-time
          description: Date time of status update

    Flextime:
      type: object
      properties:
        totalFlextimeBalance:
          type: number
          format: double
          nullable: true
        monthFlextimeBalance:
          type: number
          format: double
          nullable: true

    TrelloCard:
      type: object
      properties:
        cardId:
          type: string
          description: Unique identifier for the Trello card
        title:
          type: string
          description: Title of the Trello card
        description:
          type: string
          description: Detailed description of the Trello card
        assignedPersons:
          type: array
          items:
            type: string
          description: List of persons assigned to the Trello card
        comments:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
                description: Comment text
              createdBy:
                type: string
                description: Author of the comment

    TrelloMember:
      type: object
      properties:
        memberId:
          type: string
          description: Unique identifier for the Trello board member
        fullName:
          type: string
          description: Full name of the Trello board member
        email:
          type: string
          description: Email of the Trello board member

    PdfFile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        content:
          type: string
          format: byte
          description: Base64-encoded PDF content
    
    MemoRecord:
      type: object
      properties:
        id:
          type: string
        fileId:
          type: string 
        fileName:
          type: string
        language:
          type: string
        translatedBase64:
          type: string
          format: binary   
        
    Phase:
      type: object
      properties:
        severaPhaseId:
          format: uuid
          type: string
        name:
          type: string
          nullable: true
        isCompleted:
          type: boolean
          default: false
        workHoursEstimate:
          type: number
          format: double
        startDate:
          type: string
          format: date
        deadline:
          type: string
          format: date
        project:
          type: object
          description: A reference to Project in Phase Object
          properties:
            severaProjectId:
              format: uuid
              type: string
              description: Id of the project
            name:
              type: string
              description: Name of the project
            isClosed:
              type: boolean
              default: false
              description: Boolean value to indicate if the project has been closed or not

    ResourceAllocations:
      type: object
      properties:
        severaResourceAllocationId:
          format: uuid
          type: string
        allocationHours:
          type: number
          format: double
        calculatedAllocationHours:
          type: number
          format: double
        phase:
          type: object
          description: A reference to Phase Model in Resource Allocation Object
          properties:
            severaPhaseId:
              format: uuid
              type: string
              description: Id of the phase
            name:
              type: string
              description: Name of the phase
        user:
          type: object
          description: A reference to User Model in Resource Allocation Object
          properties:
            severaUserId:
              format: uuid
              type: string
              description: Id of the user
            name:
              type: string
              description: Name of the user
        project:
          type: object
          description: A reference to Project Model in Resource Allocation Object
          properties:
            severaProjectId:
              format: uuid
              type: string
            name:
              type: string
            isInternal:
              type: boolean

    WorkHours:
      type: object
      properties:
        severaWorkHoursId:
          type: string
        user:
          type: object
          description: A reference to User Model in WorkHours Object
          properties:
            severaUserId:
              type: string
              description: Id of the user
            name:
              type: string
              description: Name of the user
        project:
          type: object
          description: A reference to Project Model in WorkHours Object
          properties:
            severaProjectId:
              type: string
              description: Id of the project
            name:
              type: string
              description: Name of the project
            isClosed:
              type: boolean
              default: false
              description: Boolean value to indicate if the project has been closed or not
        phase:
          type: object
          description: A reference to Phase Model in WorkHours Object
          properties:
            severaPhaseId:
              type: string
              description: Id of the phase
            name:
              type: string
              description: Name of the phase
        description:
          type: string
        quantity:
          type: number
          format: double

    listWorkdaysForUser:
      type: object
      required:
      - date
      - userGuid
      - expectedHours
      - enteredHours
      - isHoliday
      description: Workday details for a specific user
      properties:
        date:
          type: string
          format: date
          description: The date of the workday
          example: "2025-10-03"
        userGuid:
          type: string
          format: uuid
          description: Unique identifier of the user
          example: "0c6b0b15-15eb-a77b-ad09-61527abc7be6"
        expectedHours:
          type: number
          format: double
          description: Expected work hours for the day
          example: 7.25
        enteredHours:
          type: number
          format: double
          description: Actual hours entered by the user
          example: 7.25
        isHoliday:
          type: boolean
          description: Indicates if the day is a holiday
          example: false
        holidayName:
          type: string
          nullable: true
          description: Name of the holiday if the date is marked as a holiday; otherwise null
          example: "Independence Day"



    ArticleMetadata:
      type: object
      required:
        - path
        - title
        - createdBy
        - draft
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the article entry
        path:
          type: string
          description: Unique path identifier for the article entry
        title:
          type: string
          description: Title of the article entry
        createdBy:
          type: string
          description: User ID who created article entry
        createdAt:
          type: string
          format: date-time
          description: Date and time when the article entry was created
        lastUpdatedBy:
          type: string
          description: User ID who lastly updated article entry
        lastUpdatedAt:
          type: string
          format: date-time
          description: Date and time when the article entry was lastly updated
        lastReadAt:
          type: string
          format: date-time
          description: Date and time when the article entry was lastly read
        readBy:
          type: array
          items:
            type: string
          description: User IDs who read article
        tags:
          type: array
          items:
            type: string
          description: Tags categorization associated with the article
        coverImage:
          type: string
          format: uri
          description: URL of the image for the article
        description:
          type: string
          description: Short description - summary of the article content
        draft:
          type: boolean
          description: Marker of draft articles
        importGroup:
          type: string
          description: Groups articles that were imported together from the same source document (e.g. security-policy)
        order:
          type: integer
          description: Position of the article within its import group for ordered navigation
        parentPath:
          type: string
          description: Path of the parent article, enabling hierarchy display in the UI

    Article:
      allOf:
        - $ref: "#/components/schemas/ArticleMetadata"
        - type: object
          required:
            - content
          properties:
            content:
              type: string
              description: Content of the article

    FileMetadata:
      type: object
      required:
        - path
        - contentType
      properties:
        path:
          type: string
          description: S3 object key for the file
        contentType:
          type: string
          description: "MIME type of the file (e.g. image/png, application/pdf)"

    DocumentImportRequest:
      type: object
      required:
        - Path
        - documentTitle
      properties:
        Path:
          type: string
          description: Same value as FileMetadata.path that was sent in the /articles/upload-file request body.
        documentTitle:
          type: string
          description: Human-readable title for the document, also used as the base URL path
        importMode:
          type: string
          enum:
            - single
            - by-contents
            - by-toc-linked
          default: by-toc
          description: "single = one article; by-toc = split by headings; by-toc-linked = split by headings with cross-links"
        overwriteExisting:
          type: boolean
          default: false
          description: When true, articles at conflicting paths are updated rather than skipped

    DocumentImportResult:
      type: object
      properties:
        basePath:
          type: string
        importMode:
          type: string
        created:
          type: integer
        skipped:
          type: integer
        articles:
          type: array
          items:
            $ref: "#/components/schemas/ArticleMetadata"
    
    SlackAvatarResponse:
      type: object
      properties:
        imageOriginal:
          type: string
          format: uri
        reason:
          type: string
          enum:
            - no_avatar
            - email_mismatch
          description: >
            Indicates why an avatar is unavailable. This field is populated 
            only when `imageOriginal` is null or absent.  
            - `no_avatar`: Slack user exists but has no avatar set.  
            - `email_mismatch`: No Slack user matches the provided email.
    
    CoachAnswer:
      type: object
      required:
        - slackUserId
        - answeredCorrectly
        - role
        - topic
        - topic_key
        - difficulty
        - date
      properties:
        slackUserId:
          type: string
          description: Slack ID of the user who answered
          example: U09BQADE64T
        answeredCorrectly:
          type: boolean
          description: Whether the user answered correctly
          example: true
        role:
          type: string
          description: Role of the user
          enum: [devops, developer, management]
          example: devops
        topic:
          type: string
          description: Human-readable topic of the question
          example: "CI/CD security best practices"
        topicKey:
          type: string
          description: Canonical topic key used for filtering/logging
          example: ci_cd
        difficulty:
          type: string
          description: Difficulty level of the question
          enum: [easy, medium, hard]
          example: medium
        date:
          type: string
          format: date
          description: Date the question was sent, in Finland timezone (YYYY-MM-DD)
          example: "2026-03-24"

    CoachAnswerResponse:
      type: object
      required:
        - success
        - streak
      description: Response returned after logging a quiz attempt
      properties:
        success:
          type: boolean
          description: Indicates if the attempt was logged successfully
          example: true
        streak:
          type: integer
          description: Current consecutive correct answer streak for the user
          example: 3

    CoachUserDetailsResponse:
      type: object
      properties:
        slackUserId:
          type: string
          description: Slack user ID of the user
          example: U12345678
        role:
          type: string
          description: Role of the user
          enum: [devops, developer, management]
          example: devops
        difficulty:
          type: string
          description: Calculated difficulty based on the user's streak
          enum: [easy, medium, hard]
          example: medium

    VacationSlackSyncResult:
      type: object
      required:
        - processedUsers
        - startedVacations
        - endedVacations
      properties:
        processedUsers:
          type: integer
          description: Number of users whose status was updated
          example: 5
        startedVacations:
          type: integer
          description: Number of vacations that started
          example: 3